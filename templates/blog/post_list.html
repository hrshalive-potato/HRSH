{% extends 'blog/base.html' %}
{% block title %}All Posts{% endblock %}
{% block content %}
{% for post in posts %}
<div class="post">
    <h2>{{post.title}}</h2>
    <img src="{{post.cover_image.url}}" alt="{{post.title}}" class="cover-image">
    <p>{{post.content|striptags|truncatewords:30}}</p>
    <a href="{% url 'post_details' post.slug %}">Read More</a>
</div>
{% empty %}
<h2>No posts found</h2>
{% endfor %}
{% endblock %}
